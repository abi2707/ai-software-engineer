<!DOCTYPE html>
<html>
<head>
    <title>Buildy AI 🐣</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --yolk: #F5A623;
            --ink: #0A0A0A;
            --paper: #F7F3EE;
            --sage: #4A7C59;
            --mist: rgba(245,243,238,0.06);
            --border: rgba(245,243,238,0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Geist Mono', monospace;
            background: var(--ink);
            color: var(--paper);
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        header {
            padding: 32px 48px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--border);
        }

        .logo-mark {
            font-size: 28px;
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.12); }
        }

        .logo-text {
            font-family: 'Instrument Serif', serif;
            font-size: 1.5rem;
        }

        .logo-text em {
            color: var(--yolk);
        }

        main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: calc(100vh - 90px);
        }

        .panel-chat {
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 28px;
        }

        .chat {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .msg {
            display: flex;
            gap: 10px;
        }

        .msg.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--mist);
        }

        .msg-text {
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.82rem;
            line-height: 1.6;
        }

        .msg.bot .msg-text {
            background: var(--mist);
            border: 1px solid var(--border);
        }

        .msg.user .msg-text {
            background: var(--yolk);
            color: black;
        }

        .input-area {
            margin-top: 16px;
            display: flex;
            gap: 10px;
        }

        textarea {
            flex: 1;
            background: var(--mist);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px;
            color: white;
            resize: none;
            font-family: inherit;
        }

        .send-btn {
            background: var(--yolk);
            border: none;
            border-radius: 10px;
            width: 40px;
            cursor: pointer;
        }

        .panel-preview {
            display: flex;
            flex-direction: column;
            padding: 28px;
        }

        .preview-empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.3;
            text-align: center;
        }

        .preview-frame-wrap {
            flex: 1;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: white;
            display: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
            opacity: 0;
            transform: translateY(10px);
        }

        .preview-frame-wrap.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .download-row {
            display: none;
            margin-top: 12px;
        }

        .download-row.active {
            display: block;
        }

        .dl-btn {
            background: var(--sage);
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            color: white;
        }

        @media (max-width: 700px) {
            main {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<header>
    <div class="logo-mark">🐣</div>
    <div class="logo-text">build<em>y</em></div>
</header>

<main>

    <!-- LEFT -->
    <div class="panel-chat">
        <div class="chat" id="chat">
            <div class="msg bot">
                <div class="msg-avatar">🐣</div>
                <div class="msg-text">
                    Describe what you want to build and I’ll generate it ✨
                </div>
            </div>
        </div>

        <div class="input-area">
            <textarea id="prompt" rows="1"
                placeholder="Build a modern todo app..."
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
            <button class="send-btn" onclick="sendMessage()">↑</button>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="panel-preview">
        <div class="preview-empty" id="previewEmpty">
            <div>
                <div style="font-size:50px;">🥚</div>
                <p>Your project will hatch here.</p>
            </div>
        </div>

        <div class="preview-frame-wrap" id="previewWrap">
            <iframe id="previewFrame"></iframe>
        </div>

        <div class="download-row" id="downloadRow">
            <button class="dl-btn" id="dlBtn">Download ZIP 📦</button>
        </div>
    </div>

</main>

<script>
const chat = document.getElementById('chat');
const previewEmpty = document.getElementById('previewEmpty');
const previewWrap = document.getElementById('previewWrap');
const previewFrame = document.getElementById('previewFrame');
const downloadRow = document.getElementById('downloadRow');
const dlBtn = document.getElementById('dlBtn');

function addMsg(text, type) {
    const msg = document.createElement('div');
    msg.className = 'msg ' + type;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = type === 'bot' ? '🐣' : '👤';

    const textEl = document.createElement('div');
    textEl.className = 'msg-text';
    textEl.textContent = text;

    msg.appendChild(avatar);
    msg.appendChild(textEl);
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

function resetPreview() {
    previewFrame.src = '';
    previewWrap.classList.remove('active');
    downloadRow.classList.remove('active');
    previewEmpty.style.display = 'flex';
}

async function sendMessage() {
    const input = document.getElementById('prompt');
    const text = input.value.trim();
    if (!text) return;

    addMsg(text, 'user');
    input.value = '';
    resetPreview();

    try {
        const res = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_prompt: text })
        });

        const data = await res.json();

        if (!res.ok || !data.preview_url) {
            addMsg(data.message || "Something went wrong.", 'bot');
            return;
        }

        addMsg("Project ready! 🚀", 'bot');

        previewEmpty.style.display = 'none';
        previewWrap.classList.add('active');
        previewFrame.src = data.preview_url + "?t=" + new Date().getTime();

        if (data.download_url) {
            downloadRow.classList.add('active');
            dlBtn.onclick = () => window.open(data.download_url, "_blank");
        }

    } catch (err) {
        addMsg("Server error. Try again.", 'bot');
    }
}
</script>

</body>
</html>
