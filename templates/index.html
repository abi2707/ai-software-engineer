<!DOCTYPE html>
<html>
<head>
    <title>Buildy AI 🐣</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --yolk: #F5A623;
            --ink: #0A0A0A;
            --paper: #F7F3EE;
            --sage: #4A7C59;
            --border: rgba(245,243,238,0.12);
            --mist: rgba(255,255,255,0.05);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Geist Mono', monospace;
            background: var(--ink);
            color: var(--paper);
            height: 100vh;
            display: grid;
            grid-template-rows: 64px 1fr;
            overflow: hidden;
        }
        header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 32px;
            border-bottom: 1px solid var(--border);
        }
        .logo { font-family: 'Instrument Serif', serif; font-size: 1.4rem; }
        .logo em { font-style: italic; color: var(--yolk); }
        .dot {
            margin-left: auto; font-size: 0.65rem; letter-spacing: 0.1em;
            text-transform: uppercase; opacity: 0.4;
            display: flex; align-items: center; gap: 6px;
        }
        .dot::before {
            content: ''; width: 6px; height: 6px; border-radius: 50%;
            background: var(--sage); animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

        main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
        }

        /* LEFT PANEL */
        .panel-left {
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            padding: 24px; gap: 16px; overflow: hidden;
        }
        .panel-label {
            font-size: 0.6rem; letter-spacing: 0.16em;
            text-transform: uppercase; opacity: 0.3;
        }
        .chat {
            flex: 1; overflow-y: auto; display: flex;
            flex-direction: column; gap: 16px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.08) transparent;
        }
        .msg { display: flex; gap: 10px; animation: up 0.3s ease; }
        @keyframes up { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .msg.user { flex-direction: row-reverse; }
        .avatar {
            width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; font-size: 14px;
        }
        .msg.bot .avatar  { background: rgba(245,166,35,0.15); border: 1px solid rgba(245,166,35,0.25); }
        .msg.user .avatar { background: var(--mist); border: 1px solid var(--border); }
        .msg-body { max-width: 78%; display: flex; flex-direction: column; gap: 3px; }
        .msg.user .msg-body { align-items: flex-end; }
        .sender { font-size: 0.58rem; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.3; }
        .bubble {
            font-size: 0.82rem; line-height: 1.6;
            padding: 10px 14px; border-radius: 12px;
        }
        .msg.bot  .bubble { background: var(--mist); border: 1px solid var(--border); }
        .msg.user .bubble { background: var(--yolk); color: var(--ink); font-weight: 500; }

        .typing-wrap { display: flex; gap: 10px; }
        .typing {
            display: flex; gap: 4px; align-items: center;
            padding: 10px 14px; background: var(--mist);
            border: 1px solid var(--border); border-radius: 12px;
        }
        .typing span {
            width: 5px; height: 5px; border-radius: 50%;
            background: rgba(245,243,238,0.4);
            animation: dot 1.2s infinite;
        }
        .typing span:nth-child(2){animation-delay:.2s}
        .typing span:nth-child(3){animation-delay:.4s}
        @keyframes dot{0%,80%,100%{transform:scale(0.7);opacity:0.3}40%{transform:scale(1);opacity:1}}

        .input-area { display: flex; flex-direction: column; gap: 8px; }
        .input-row {
            display: flex; gap: 10px; align-items: flex-end;
            background: var(--mist); border: 1px solid var(--border);
            border-radius: 14px; padding: 10px 10px 10px 16px;
            transition: border-color 0.2s;
        }
        .input-row:focus-within { border-color: rgba(245,166,35,0.4); }
        textarea {
            flex: 1; background: transparent; border: none; outline: none;
            color: var(--paper); font-family: 'Geist Mono', monospace;
            font-size: 0.82rem; line-height: 1.5; resize: none;
            min-height: 22px; max-height: 120px; height: 22px;
        }
        textarea::placeholder { opacity: 0.3; }
        .send-btn {
            background: var(--yolk); border: none; border-radius: 10px;
            width: 36px; height: 36px; cursor: pointer; font-size: 18px;
            font-weight: bold; color: var(--ink); flex-shrink: 0;
            transition: transform 0.15s, opacity 0.15s;
            display: flex; align-items: center; justify-content: center;
        }
        .send-btn:hover { transform: scale(1.08); }
        .send-btn:active { transform: scale(0.95); }
        .hint { font-size: 0.6rem; opacity: 0.2; text-align: center; }

        /* RIGHT PANEL */
        .panel-right {
            display: flex; flex-direction: column;
            padding: 24px; gap: 16px; overflow: hidden;
        }
        .preview-empty {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 12px; opacity: 0.2; text-align: center;
        }
        .preview-empty .egg { font-size: 52px; animation: breathe 3s ease-in-out infinite; }
        @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
        .preview-empty p { font-size: 0.75rem; line-height: 1.7; max-width: 180px; }

        .preview-frame {
            flex: 1; border-radius: 14px; overflow: hidden;
            border: 1px solid var(--border); background: white;
            display: none;
        }
        .preview-frame.active { display: block; }
        .preview-frame iframe { width: 100%; height: 100%; border: none; }

        .dl-bar {
            display: none; align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(74,124,89,0.1);
            border: 1px solid rgba(74,124,89,0.3);
            border-radius: 12px;
        }
        .dl-bar.active { display: flex; }
        .dl-bar span { font-size: 0.75rem; opacity: 0.7; }
        .dl-btn {
            background: var(--sage); color: var(--paper);
            border: none; border-radius: 8px; padding: 7px 16px;
            font-family: 'Geist Mono', monospace; font-size: 0.72rem;
            cursor: pointer; letter-spacing: 0.04em;
            transition: opacity 0.15s, transform 0.15s;
        }
        .dl-btn:hover { opacity: 0.85; transform: translateY(-1px); }

        @media(max-width:680px){
            main { grid-template-columns: 1fr; grid-template-rows: 1fr 300px; }
            .panel-left { border-right: none; border-bottom: 1px solid var(--border); }
        }
    </style>
</head>
<body>

<header>
    <span style="font-size:24px">🐣</span>
    <div class="logo">build<em>y</em></div>
    <div class="dot">online</div>
</header>

<main>
    <!-- LEFT: Chat -->
    <div class="panel-left">
        <div class="panel-label">Conversation</div>
        <div class="chat" id="chat">
            <div class="msg bot">
                <div class="avatar">🐣</div>
                <div class="msg-body">
                    <div class="sender">Buildy</div>
                    <div class="bubble">Hey! Tell me what to build — an app, a tool, a game — and I'll generate it for you. ✨</div>
                </div>
            </div>
        </div>
        <div class="input-area">
            <div class="input-row">
                <textarea id="prompt" placeholder="Describe your software idea…"
                    oninput="autoResize(this)"
                    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
                <button class="send-btn" onclick="send()">↑</button>
            </div>
            <div class="hint">Enter to send · Shift+Enter for new line</div>
        </div>
    </div>

    <!-- RIGHT: Preview -->
    <div class="panel-right">
        <div class="panel-label">Preview</div>
        <div class="preview-empty" id="previewEmpty">
            <div class="egg">🥚</div>
            <p>Your project will appear here once generated.</p>
        </div>
        <div class="preview-frame" id="previewWrap">
            <iframe id="previewFrame"></iframe>
        </div>
        <div class="dl-bar" id="dlBar">
            <span>Project ready — download the full package</span>
            <button class="dl-btn" id="dlBtn">Download ZIP 📦</button>
        </div>
    </div>
</main>

<script>
    const chatEl      = document.getElementById('chat');
    const previewEmpty = document.getElementById('previewEmpty');
    const previewWrap  = document.getElementById('previewWrap');
    const previewFrame = document.getElementById('previewFrame');
    const dlBar        = document.getElementById('dlBar');
    const dlBtn        = document.getElementById('dlBtn');

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function addMsg(text, type) {
        const wrap   = document.createElement('div');
        wrap.className = 'msg ' + type;

        const av = document.createElement('div');
        av.className = 'avatar';
        av.textContent = type === 'bot' ? '🐣' : '👤';

        const body = document.createElement('div');
        body.className = 'msg-body';

        const sender = document.createElement('div');
        sender.className = 'sender';
        sender.textContent = type === 'bot' ? 'Buildy' : 'You';

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = text;

        body.appendChild(sender);
        body.appendChild(bubble);
        wrap.appendChild(av);
        wrap.appendChild(body);
        chatEl.appendChild(wrap);
        chatEl.scrollTop = chatEl.scrollHeight;
    }

    let typingEl = null;
    function showTyping() {
        typingEl = document.createElement('div');
        typingEl.className = 'msg bot';
        typingEl.innerHTML = `
            <div class="avatar">🐣</div>
            <div class="msg-body">
                <div class="sender">Buildy</div>
                <div class="typing">
                    <span></span><span></span><span></span>
                </div>
            </div>`;
        chatEl.appendChild(typingEl);
        chatEl.scrollTop = chatEl.scrollHeight;
    }
    function hideTyping() {
        if (typingEl) { typingEl.remove(); typingEl = null; }
    }

    async function send() {
        const input = document.getElementById('prompt');
        const text  = input.value.trim();
        if (!text) return;

        addMsg(text, 'user');
        input.value = '';
        input.style.height = 'auto';
        showTyping();

        try {
            const res  = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_prompt: text })
            });
            const data = await res.json();
            hideTyping();

            if (!res.ok || data.message.startsWith('Agent error')) {
                addMsg('Something went wrong: ' + (data.message || 'unknown error'), 'bot');
                return;
            }

            addMsg('Project generated! Check the preview →', 'bot');

            if (data.preview_html) {
                previewEmpty.style.display = 'none';
                previewWrap.classList.add('active');
                previewFrame.srcdoc = data.preview_html;
            } else {
                addMsg('Note: no preview available (no index.html found in output).', 'bot');
            }

            if (data.download_url) {
                dlBar.classList.add('active');
                dlBtn.onclick = () => window.location.href = data.download_url;
            }

        } catch (err) {
            hideTyping();
            addMsg('Network error — please try again.', 'bot');
        }
    }
</script>

</body>
</html>
