<!DOCTYPE html>
<html>
<head>
    <title>Buildy AI 🐣</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --yolk: #FFB703;
            --sky: #023047;
            --grass: #06D6A0;
            --blush: #FB5607;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--sky);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            overflow-x: hidden;
        }

        /* Floating blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.15;
            animation: drift 12s ease-in-out infinite alternate;
            z-index: 0;
        }
        .blob-1 { width: 500px; height: 500px; background: var(--yolk); top: -100px; left: -150px; }
        .blob-2 { width: 400px; height: 400px; background: var(--grass); bottom: -50px; right: -100px; animation-delay: -4s; }

        @keyframes drift {
            from { transform: translate(0, 0); }
            to { transform: translate(30px, 20px); }
        }

        header {
            z-index: 10;
            text-align: center;
            padding: 60px 20px 20px;
        }

        .egg {
            font-size: 48px;
            animation: wobble 3s ease-in-out infinite;
        }

        @keyframes wobble {
            0%,100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2rem, 6vw, 3rem);
            margin-top: 10px;
        }

        h1 span { color: var(--yolk); }

        .subtitle {
            margin-top: 10px;
            opacity: 0.6;
        }

        main {
            z-index: 10;
            width: 100%;
            max-width: 680px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            min-height: 250px;
            max-height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: blur(20px);
        }

        .bubble {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            animation: pop 0.3s ease;
        }

        @keyframes pop {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bubble.user { flex-direction: row-reverse; }

        .avatar {
            font-size: 20px;
        }

        .text {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.9rem;
        }

        .user .text {
            background: var(--yolk);
            color: var(--sky);
            border-bottom-right-radius: 4px;
        }

        .bot .text {
            background: rgba(255,255,255,0.1);
            border-bottom-left-radius: 4px;
        }

        .typing {
            display: flex;
            gap: 5px;
            padding: 8px 12px;
        }

        .typing span {
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            animation: blink 1.2s infinite;
        }
        .typing span:nth-child(2) { animation-delay: .2s; }
        .typing span:nth-child(3) { animation-delay: .4s; }

        @keyframes blink {
            0%,80%,100% { opacity: .3; }
            40% { opacity: 1; }
        }

        .input-bar {
            display: flex;
            gap: 10px;
            background: rgba(255,255,255,0.06);
            border-radius: 50px;
            padding: 8px 14px;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
        }

        button {
            background: var(--yolk);
            border: none;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            cursor: pointer;
            font-size: 18px;
            transition: transform .2s;
        }

        button:hover { transform: scale(1.1) rotate(8deg); }

        .download-card {
            background: rgba(6,214,160,0.15);
            border: 1px solid rgba(6,214,160,0.4);
            padding: 14px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .download-card button {
            background: var(--grass);
            border-radius: 30px;
            width: auto;
            padding: 8px 16px;
            font-size: 0.8rem;
        }

    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<header>
    <div class="egg">🐣</div>
    <h1>Tell me what to <span>build</span></h1>
    <p class="subtitle">Describe it. I’ll hatch it. 🥚→🐣→🚀</p>
</header>

<main>
    <div class="chat" id="chat"></div>

    <div class="input-bar">
        <input id="prompt" placeholder="Describe your software idea..." 
               onkeydown="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">🚀</button>
    </div>
</main>

<script>
const chat = document.getElementById("chat");

function addBubble(text, type) {
    const wrap = document.createElement("div");
    wrap.className = "bubble " + type;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = type === "bot" ? "🐣" : "😊";

    const textDiv = document.createElement("div");
    textDiv.className = "text";
    textDiv.textContent = text;

    wrap.appendChild(avatar);
    wrap.appendChild(textDiv);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
}

function addTyping() {
    const wrap = document.createElement("div");
    wrap.className = "bubble bot";
    wrap.id = "typing";

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "🐣";

    const dots = document.createElement("div");
    dots.className = "typing";
    dots.innerHTML = "<span></span><span></span><span></span>";

    wrap.appendChild(avatar);
    wrap.appendChild(dots);
    chat.appendChild(wrap);
}

function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
}

async function sendMessage() {
    const input = document.getElementById("prompt");
    const prompt = input.value.trim();
    if (!prompt) return;

    addBubble(prompt, "user");
    input.value = "";
    addTyping();

    try {
        const response = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ user_prompt: prompt })
        });

        const data = await response.json();
        removeTyping();

        if (!response.ok) {
            addBubble("Oops! Something cracked 🥚 Try again!", "bot");
            return;
        }

        addBubble("Your project is ready! 🎉", "bot");

if (data.preview_html) {
    const previewContainer = document.createElement("div");
    previewContainer.style.marginTop = "20px";
    previewContainer.style.borderRadius = "20px";
    previewContainer.style.overflow = "hidden";
    previewContainer.style.border = "2px solid rgba(255,255,255,0.2)";
    previewContainer.style.height = "400px";

    const iframe = document.createElement("iframe");
    iframe.style.width = "100%";
    iframe.style.height = "100%";
    iframe.style.border = "none";

    previewContainer.appendChild(iframe);
    chat.appendChild(previewContainer);

    iframe.srcdoc = data.preview_html;
}

const askDownload = document.createElement("div");
askDownload.className = "download-card";
askDownload.innerHTML = `
    <span>Do you want to download the full project?</span>
`;

const btn = document.createElement("button");
btn.textContent = "Download ZIP 📦";
btn.onclick = () => window.location.href = data.download_url;

askDownload.appendChild(btn);
chat.appendChild(askDownload);

chat.scrollTop = chat.scrollHeight;

        const card = document.createElement("div");
        card.className = "download-card";
        card.innerHTML = `
            <span>Download your software package</span>
        `;

        const btn = document.createElement("button");
        btn.textContent = "Download 📦";
        btn.onclick = () => window.location.href = data.download_url || "/download";

        card.appendChild(btn);
        chat.appendChild(card);
        chat.scrollTop = chat.scrollHeight;

    } catch (err) {
        removeTyping();
        addBubble("Buildy tripped 🐥 Try again!", "bot");
    }
}
</script>

</body>
</html>
