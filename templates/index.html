<!DOCTYPE html>
<html>
<head>
    <title>Buildy AI 🐣</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --yolk: #F5A623;
            --ink: #0A0A0A;
            --paper: #F7F3EE;
            --sage: #4A7C59;
            --mist: rgba(245,243,238,0.06);
            --border: rgba(245,243,238,0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Geist Mono', monospace;
            background: var(--ink);
            color: var(--paper);
            height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        header {
            padding: 28px 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: 'Instrument Serif', serif;
            font-size: 1.4rem;
        }

        main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100%;
        }

        .left {
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
        }

        .chat {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .msg {
            display: flex;
            gap: 10px;
        }

        .msg.user { flex-direction: row-reverse; }

        .bubble {
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.82rem;
            max-width: 80%;
        }

        .bot .bubble {
            background: var(--mist);
            border: 1px solid var(--border);
        }

        .user .bubble {
            background: var(--yolk);
            color: black;
        }

        .input-area {
            margin-top: 16px;
            display: flex;
            gap: 10px;
        }

        textarea {
            flex: 1;
            background: var(--mist);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            color: white;
            resize: none;
            font-family: inherit;
        }

        button {
            background: var(--yolk);
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .right {
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .preview-empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.3;
        }

        .preview-frame {
            flex: 1;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            display: none;
            background: white;
        }

        .preview-frame.active {
            display: block;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .download {
            display: none;
            margin-top: 12px;
        }

        .download.active {
            display: block;
        }

        @media (max-width: 800px) {
            main { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

<header>
    <div class="logo">🐣 buildy</div>
</header>

<main>

    <div class="left">
        <div class="chat" id="chat">
            <div class="msg bot">
                <div class="bubble">Describe what you want to build ✨</div>
            </div>
        </div>

        <div class="input-area">
            <textarea id="prompt" rows="1"
                placeholder="Build a modern todo app..."
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <div class="right">
        <div class="preview-empty" id="previewEmpty">
            <div>🥚 Your project will appear here</div>
        </div>

        <div class="preview-frame" id="previewFrameWrap">
            <iframe id="previewFrame"></iframe>
        </div>

        <div class="download" id="downloadWrap">
            <button id="downloadBtn">Download ZIP 📦</button>
        </div>
    </div>

</main>

<script>
const chat = document.getElementById("chat");
const previewEmpty = document.getElementById("previewEmpty");
const previewFrameWrap = document.getElementById("previewFrameWrap");
const previewFrame = document.getElementById("previewFrame");
const downloadWrap = document.getElementById("downloadWrap");
const downloadBtn = document.getElementById("downloadBtn");

function addMessage(text, type) {
    const msg = document.createElement("div");
    msg.className = "msg " + type;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    msg.appendChild(bubble);
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

function resetPreview() {
    previewFrame.src = "";
    previewFrameWrap.classList.remove("active");
    downloadWrap.classList.remove("active");
    previewEmpty.style.display = "flex";
}

async function sendMessage() {
    const input = document.getElementById("prompt");
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    resetPreview();
    addMessage("Generating project...", "bot");

    try {
        const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ user_prompt: text })
        });

        const data = await res.json();

        if (!res.ok || !data.preview_url) {
            addMessage(data.message || "Generation failed.", "bot");
            return;
        }

        addMessage("Project ready! 🚀", "bot");

        previewEmpty.style.display = "none";
        previewFrameWrap.classList.add("active");

        // Cache bust
        previewFrame.src = data.preview_url + "?t=" + new Date().getTime();

        if (data.download_url) {
            downloadWrap.classList.add("active");
            downloadBtn.onclick = () => {
                window.open(data.download_url, "_blank");
            };
        }

    } catch (err) {
        addMessage("Server error. Try again.", "bot");
    }
}
</script>

</body>
</html>
