<!DOCTYPE html>
<html>
<head>
    <title>Buildy AI 🐣</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --yolk: #F5A623;
            --ink: #0A0A0A;
            --paper: #F7F3EE;
            --sage: #4A7C59;
            --clay: #C4602E;
            --mist: rgba(245,243,238,0.06);
            --border: rgba(245,243,238,0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Geist Mono', monospace;
            background: var(--ink);
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr auto;
            grid-template-columns: 1fr;
            color: var(--paper);
            overflow-x: hidden;
        }

        /* Subtle noise grain overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 100;
            opacity: 0.6;
        }

        /* Accent glow — top right */
        body::after {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            top: -200px;
            right: -200px;
            background: radial-gradient(circle, rgba(245,166,35,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── HEADER ── */
        header {
            z-index: 10;
            padding: 40px 48px 0;
            display: flex;
            align-items: baseline;
            gap: 16px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 24px;
        }

        .logo-mark {
            font-size: 28px;
            line-height: 1;
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.12); }
        }

        .logo-text {
            font-family: 'Instrument Serif', serif;
            font-size: 1.5rem;
            letter-spacing: -0.01em;
        }

        .logo-text em {
            font-style: italic;
            color: var(--yolk);
        }

        .status-pill {
            margin-left: auto;
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 4px 10px;
            border: 1px solid var(--border);
            border-radius: 100px;
            opacity: 0.5;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-pill::before {
            content: '';
            width: 5px;
            height: 5px;
            background: var(--sage);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ── MAIN ── */
        main {
            z-index: 10;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            height: calc(100vh - 110px);
        }

        /* Left panel: chat */
        .panel-chat {
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 28px 32px;
            gap: 20px;
        }

        .panel-label {
            font-size: 0.6rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            opacity: 0.35;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .chat {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-right: 8px;
            scrollbar-width: thin;
            scrollbar-color: rgba(245,243,238,0.1) transparent;
        }

        .chat::-webkit-scrollbar { width: 3px; }
        .chat::-webkit-scrollbar-track { background: transparent; }
        .chat::-webkit-scrollbar-thumb { background: rgba(245,243,238,0.12); border-radius: 2px; }

        /* Message rows */
        .msg {
            display: flex;
            gap: 12px;
            animation: slideUp 0.35s cubic-bezier(.22,1,.36,1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .msg.bot .msg-avatar  { background: rgba(245,166,35,0.12); border: 1px solid rgba(245,166,35,0.2); }
        .msg.user .msg-avatar { background: rgba(245,243,238,0.06); border: 1px solid var(--border); }

        .msg-body {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-width: 78%;
        }

        .msg.user .msg-body { align-items: flex-end; }

        .msg-sender {
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.35;
        }

        .msg-text {
            font-size: 0.82rem;
            line-height: 1.6;
            padding: 10px 14px;
            border-radius: 12px;
        }

        .msg.bot  .msg-text { background: var(--mist); border: 1px solid var(--border); }
        .msg.user .msg-text { background: var(--yolk); color: var(--ink); }

        /* Typing indicator */
        .typing-dots {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 10px 14px;
            background: var(--mist);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: fit-content;
        }

        .typing-dots span {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(245,243,238,0.4);
            animation: dot 1.2s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: .2s; }
        .typing-dots span:nth-child(3) { animation-delay: .4s; }

        @keyframes dot {
            0%,80%,100% { transform: scale(0.7); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Input bar */
        .input-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            background: var(--mist);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 10px 10px 10px 16px;
            transition: border-color 0.2s;
        }

        .input-row:focus-within {
            border-color: rgba(245,166,35,0.35);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--paper);
            font-family: 'Geist Mono', monospace;
            font-size: 0.82rem;
            line-height: 1.5;
            resize: none;
            max-height: 120px;
            min-height: 22px;
            height: 22px;
        }

        textarea::placeholder { opacity: 0.35; }

        .send-btn {
            background: var(--yolk);
            border: none;
            border-radius: 10px;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            transition: transform 0.15s, background 0.15s;
        }

        .send-btn:hover { transform: scale(1.08); background: #f0b830; }
        .send-btn:active { transform: scale(0.96); }

        .input-hint {
            font-size: 0.6rem;
            opacity: 0.25;
            text-align: center;
            letter-spacing: 0.05em;
        }

        /* ── RIGHT PANEL: Preview ── */
        .panel-preview {
            display: flex;
            flex-direction: column;
            padding: 28px 32px;
            gap: 20px;
        }

        .preview-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .preview-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            opacity: 0.25;
            text-align: center;
        }

        .preview-empty .big-egg { font-size: 56px; }

        .preview-empty p {
            font-size: 0.75rem;
            line-height: 1.7;
            max-width: 200px;
        }

        .preview-frame-wrap {
            flex: 1;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: white;
            display: none;
        }

        .preview-frame-wrap.active { display: block; }

        .preview-frame-wrap iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .download-row {
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(74,124,89,0.12);
            border: 1px solid rgba(74,124,89,0.25);
            border-radius: 12px;
        }

        .download-row.active { display: flex; }

        .download-row span {
            font-size: 0.75rem;
            opacity: 0.7;
        }

        .dl-btn {
            background: var(--sage);
            color: var(--paper);
            border: none;
            border-radius: 8px;
            padding: 7px 14px;
            font-family: 'Geist Mono', monospace;
            font-size: 0.72rem;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: opacity 0.15s, transform 0.15s;
        }

        .dl-btn:hover { opacity: 0.85; transform: translateY(-1px); }


        /* ── RESPONSIVE ── */
        @media (max-width: 700px) {
            header { padding: 24px 20px 16px; }
            main {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr auto;
                height: auto;
                min-height: calc(100vh - 90px);
            }
            .panel-chat { border-right: none; border-bottom: 1px solid var(--border); }
            .panel-preview { min-height: 300px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-mark">🐣</div>
    <div class="logo-text">build<em>y</em></div>
    <div class="status-pill">Online</div>
</header>

<main>

    <!-- LEFT: Chat -->
    <div class="panel-chat">
        <div class="panel-label">Conversation</div>

        <div class="chat" id="chat">
            <div class="msg bot">
                <div class="msg-avatar">🐣</div>
                <div class="msg-body">
                    <div class="msg-sender">Buildy</div>
                    <div class="msg-text">Hey! Describe what you want to build — an app, a tool, a website — and I'll hatch it for you. ✨</div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-row">
                <textarea id="prompt" placeholder="Describe your software idea…" rows="1"
                    oninput="autoResize(this)"
                    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
                <button class="send-btn" onclick="sendMessage()">↑</button>
            </div>
            <div class="input-hint">Enter to send · Shift+Enter for new line</div>
        </div>
    </div>

    <!-- RIGHT: Preview -->
    <div class="panel-preview">
        <div class="preview-header">
            <div class="panel-label">Preview</div>
        </div>

        <div class="preview-empty" id="previewEmpty">
            <div class="big-egg">🥚</div>
            <p>Your project will hatch here once it's ready.</p>
        </div>

        <div class="preview-frame-wrap" id="previewWrap">
            <iframe id="previewFrame"></iframe>
        </div>

        <div class="download-row" id="downloadRow">
            <span>Project ready — download the full package</span>
            <button class="dl-btn" id="dlBtn">Download ZIP 📦</button>
        </div>
    </div>

</main>

<script>
    const chat = document.getElementById('chat');
    const previewEmpty = document.getElementById('previewEmpty');
    const previewWrap = document.getElementById('previewWrap');
    const previewFrame = document.getElementById('previewFrame');
    const downloadRow = document.getElementById('downloadRow');
    const dlBtn = document.getElementById('dlBtn');

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function addMsg(text, type) {
        const wrap = document.createElement('div');
        wrap.className = 'msg ' + type;

        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        avatar.textContent = type === 'bot' ? '🐣' : '👤';

        const body = document.createElement('div');
        body.className = 'msg-body';

        const sender = document.createElement('div');
        sender.className = 'msg-sender';
        sender.textContent = type === 'bot' ? 'Buildy' : 'You';

        const textEl = document.createElement('div');
        textEl.className = 'msg-text';
        textEl.textContent = text;

        body.appendChild(sender);
        body.appendChild(textEl);
        wrap.appendChild(avatar);
        wrap.appendChild(body);
        chat.appendChild(wrap);
        chat.scrollTop = chat.scrollHeight;
    }

    let typingEl = null;

    function showTyping() {
        typingEl = document.createElement('div');
        typingEl.className = 'msg bot';
        typingEl.innerHTML = `
            <div class="msg-avatar">🐣</div>
            <div class="msg-body">
                <div class="msg-sender">Buildy</div>
                <div class="typing-dots"><span></span><span></span><span></span></div>
            </div>`;
        chat.appendChild(typingEl);
        chat.scrollTop = chat.scrollHeight;
    }

    function hideTyping() {
        if (typingEl) { typingEl.remove(); typingEl = null; }
    }

    async function sendMessage() {
        const input = document.getElementById('prompt');
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, 'user');
        input.value = '';
        input.style.height = 'auto';
        showTyping();

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_prompt: text })
            });
            const data = await res.json();
            hideTyping();

            if (!res.ok) {
                addMsg('Something cracked 🥚 — please try again!', 'bot');
                return;
            }

            addMsg('Your project is ready! 🎉 Check the preview on the right.', 'bot');

            if (data.preview_html) {
                previewEmpty.style.display = 'none';
                previewWrap.classList.add('active');
                previewFrame.srcdoc = data.preview_html;
            }

            if (data.download_url) {
                downloadRow.classList.add('active');
                dlBtn.onclick = () => window.location.href = data.download_url;
            }

        } catch (err) {
            hideTyping();
            addMsg('Buildy tripped 🐥 — try again!', 'bot');
        }
    }
</script>

</body>
</html>
